ktor:
  application:
    modules:
      - com.oeims.ApplicationKt.module
  deployment:
    port: 8080

app:
  api:
    base-path: "/api"

jwt:
  secret: "change-me-before-production"
  issuer: "oeims"
  audience: "oeims-users"
  realm: "OEIMS"
  expiration-ms: 86400000

database:
  path: "./oeims.db"

heartbeat:
  interval-ms: 15000
  timeout-ms: 30000