ktor:
  application:
    modules:
      - com.oeims.ApplicationKt.module
  deployment:
    port: 8080

app:
  environment: "development"

  api:
    base-path: "/api"

  frontend:
    base-url: "http://localhost:5173"

jwt:
  secret: "$JWT_SECRET"
  issuer: "oeims"

  auth:
    audience: "oeims"
    realm: "oeims"
    expiration-ms: 3600000

  email-verification:
    audience: "oeims:email-verification"
    realm: "oeims"
    expiration-ms: 600000

  sentinel:
    audience: "oeims:sentinel"
    realm: "oeims"
    expiration-ms: 7200000

database:
  path: "./oeims.db"

heartbeat:
  interval-ms: 15000
  timeout-ms: 30000