services:
  server:
    build:
      context: ./Server
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_PATH: /data/oeims.db
    volumes:
      - oeims-data:/data
    expose:
      - "8080"

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    ports:
      - "${OEIMS_PORT:-5173}:5173"
    depends_on:
      - server

volumes:
  oeims-data:
