services:
  server:
    build:
      context: ./Server
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-before-production}
      DATABASE_PATH: /data/oeims.db
    volumes:
      - oeims-data:/data
    expose:
      - "8080"

  professor:
    build:
      context: ./Professor
      args:
        VITE_API_URL: /api
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  oeims-data:
